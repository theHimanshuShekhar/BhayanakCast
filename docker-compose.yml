services:
  app:
    container_name: bhayanakcast-app
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://bhayanakcast:bhayanakcast@postgres:5432/bhayanakcast
      VALKEY_URL: redis://valkey:6379
    ports:
      - '${PORT:-3000}:3000'

  postgres:
    container_name: bhayanakcast-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bhayanakcast
      POSTGRES_USER: bhayanakcast
      POSTGRES_PASSWORD: bhayanakcast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bhayanakcast -d bhayanakcast']
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    container_name: bhayanakcast-valkey
    image: valkey/valkey:8-alpine
    command: ['valkey-server', '--save', '', '--appendonly', 'no']

volumes:
  postgres_data:
