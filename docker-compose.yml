services:
  postgres:
    image: postgres:15-alpine
    container_name: bhayanak-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bhayanak-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: bhayanak-app
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bhayanak-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bhayanak-network:
    driver: bridge
