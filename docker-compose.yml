# Use postgres/example user/password credentials
services:
  db:
    container_name: BhayanakCastDB
    user: root
    image: bitnami/postgresql:latest
    restart: unless-stopped
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=bhayanak
      - POSTGRESQL_PORT_NUMBER=3232
    ports:
      - 3232:3232
    volumes:
      - ./pgdata:/bitnami/postgresql

  server:
    container_name: BhayanakCastClient
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      - db
      - websocket_server
    # env_file:
    #   - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:bhayanak@db:3232

  websocket_server:
    container_name: BhayanakCastWebSocketServer
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      - db
    # env_file:
    #   - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:bhayanak@db:3232
